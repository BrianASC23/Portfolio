<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fbbf24">
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="1000"/>
    <line x1="800" y1="0" x2="800" y2="1000"/>
    <line x1="1200" y1="0" x2="1200" y2="1000"/>
  </g>

  <!-- Chat window frame -->
  <rect x="300" y="120" width="1000" height="760" rx="16" fill="#1a2332" stroke="#334155" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="300" y="120" width="1000" height="52" rx="16" fill="#1e293b"/>
  <rect x="300" y="156" width="1000" height="16" fill="#1e293b"/>
  <circle cx="332" cy="146" r="7" fill="#ef4444" opacity="0.7"/>
  <circle cx="356" cy="146" r="7" fill="#eab308" opacity="0.7"/>
  <circle cx="380" cy="146" r="7" fill="#22c55e" opacity="0.7"/>
  <text x="800" y="151" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="14">SBU Advising Bot</text>

  <!-- User message 1 -->
  <rect x="620" y="220" width="640" height="56" rx="12" fill="#f59e0b" opacity="0.15"/>
  <rect x="620" y="220" width="640" height="56" rx="12" stroke="#f59e0b" stroke-width="1" opacity="0.3" fill="none"/>
  <text x="940" y="254" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="16">What prereqs do I need for CSE 320?</text>

  <!-- Bot message 1 -->
  <rect x="340" y="310" width="720" height="120" rx="12" fill="#334155" opacity="0.5"/>
  <circle cx="370" cy="340" r="16" fill="url(#amber)"/>
  <text x="370" y="345" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="14" font-weight="bold">AI</text>
  <text x="400" y="348" fill="#e2e8f0" font-family="sans-serif" font-size="15">Based on the course bulletin, CSE 320 requires:</text>
  <text x="400" y="374" fill="#94a3b8" font-family="sans-serif" font-size="14">  • CSE 220 (System Fundamentals I)</text>
  <text x="400" y="398" fill="#94a3b8" font-family="sans-serif" font-size="14">  • C or higher grade required</text>

  <!-- Source citation badge -->
  <rect x="400" y="413" width="200" height="24" rx="6" fill="#f59e0b" opacity="0.1"/>
  <text x="500" y="429" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11">📄 Bulletin p.342</text>

  <!-- User message 2 -->
  <rect x="540" y="470" width="720" height="56" rx="12" fill="#f59e0b" opacity="0.15"/>
  <rect x="540" y="470" width="720" height="56" rx="12" stroke="#f59e0b" stroke-width="1" opacity="0.3" fill="none"/>
  <text x="900" y="504" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="16">Can I take CSE 316 and CSE 320 at the same time?</text>

  <!-- Bot message 2 -->
  <rect x="340" y="560" width="680" height="100" rx="12" fill="#334155" opacity="0.5"/>
  <circle cx="370" cy="590" r="16" fill="url(#amber)"/>
  <text x="370" y="595" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="14" font-weight="bold">AI</text>
  <text x="400" y="598" fill="#e2e8f0" font-family="sans-serif" font-size="15">Yes! CSE 316 and CSE 320 have no co-requisite</text>
  <text x="400" y="622" fill="#e2e8f0" font-family="sans-serif" font-size="15">conflict. Many students take them together in</text>
  <text x="400" y="646" fill="#94a3b8" font-family="sans-serif" font-size="15">their junior year. ✅</text>

  <!-- Input bar -->
  <rect x="340" y="710" width="920" height="48" rx="24" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="380" y="739" fill="#475569" font-family="sans-serif" font-size="14">Ask about courses, prerequisites, or degree plans...</text>
  <circle cx="1224" cy="734" r="18" fill="url(#amber)"/>
  <text x="1224" y="740" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="18">↑</text>

  <!-- Floating nodes decoration -->
  <circle cx="120" cy="300" r="4" fill="#fbbf24" opacity="0.3"/>
  <circle cx="180" cy="500" r="3" fill="#fbbf24" opacity="0.2"/>
  <circle cx="1450" cy="250" r="5" fill="#fbbf24" opacity="0.25"/>
  <circle cx="1500" cy="600" r="3" fill="#fbbf24" opacity="0.15"/>
  <line x1="120" y1="300" x2="180" y2="500" stroke="#fbbf24" stroke-width="1" opacity="0.08"/>
  <line x1="1450" y1="250" x2="1500" y2="600" stroke="#fbbf24" stroke-width="1" opacity="0.08"/>
</svg>
