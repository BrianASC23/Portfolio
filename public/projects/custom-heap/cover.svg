<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.06" fill="#fbbf24">
    <circle cx="50" cy="50" r="1.5"/><circle cx="150" cy="50" r="1.5"/><circle cx="250" cy="50" r="1.5"/>
    <circle cx="350" cy="50" r="1.5"/><circle cx="450" cy="50" r="1.5"/><circle cx="550" cy="50" r="1.5"/>
    <circle cx="50" cy="150" r="1.5"/><circle cx="150" cy="150" r="1.5"/><circle cx="250" cy="150" r="1.5"/>
    <circle cx="350" cy="150" r="1.5"/><circle cx="450" cy="150" r="1.5"/><circle cx="550" cy="150" r="1.5"/>
  </g>

  <!-- Title area -->
  <text x="800" y="60" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="22" font-weight="bold">CUSTOM HEAP ALLOCATOR</text>
  <text x="800" y="85" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="14">Memory Layout Visualization — Explicit Free List with Coalescing</text>

  <!-- Memory layout visualization -->
  <g transform="translate(80, 120)">
    <!-- Address bar -->
    <text x="0" y="0" fill="#475569" font-family="monospace" font-size="11">HEAP START 0x00000000</text>
    <text x="1320" y="0" fill="#475569" font-family="monospace" font-size="11">0x0000FFFF HEAP END</text>

    <!-- Memory blocks - Row 1 -->
    <g transform="translate(0, 20)">
      <!-- Allocated block 1 -->
      <rect x="0" y="0" width="200" height="80" rx="4" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
      <text x="100" y="24" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">ALLOCATED</text>
      <text x="100" y="44" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">200 bytes</text>
      <text x="100" y="62" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">hdr: 0x19 | 0x1</text>

      <!-- Free block 1 (large) -->
      <rect x="210" y="0" width="340" height="80" rx="4" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 3"/>
      <text x="380" y="24" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">FREE</text>
      <text x="380" y="44" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">512 bytes</text>
      <text x="380" y="62" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">hdr: 0x200 | 0x0  prev→0x0  next→0x400</text>

      <!-- Allocated block 2 -->
      <rect x="560" y="0" width="140" height="80" rx="4" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
      <text x="630" y="24" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">ALLOCATED</text>
      <text x="630" y="44" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">128 bytes</text>
      <text x="630" y="62" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">hdr: 0x81 | 0x1</text>

      <!-- Allocated block 3 -->
      <rect x="710" y="0" width="180" height="80" rx="4" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
      <text x="800" y="24" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">ALLOCATED</text>
      <text x="800" y="44" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">256 bytes</text>
      <text x="800" y="62" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">hdr: 0x101 | 0x1</text>

      <!-- Free block 2 -->
      <rect x="900" y="0" width="260" height="80" rx="4" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 3"/>
      <text x="1030" y="24" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">FREE</text>
      <text x="1030" y="44" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">384 bytes</text>
      <text x="1030" y="62" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">hdr: 0x180 | 0x0  prev→0x210  next→NULL</text>

      <!-- Allocated block 4 -->
      <rect x="1170" y="0" width="270" height="80" rx="4" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
      <text x="1305" y="24" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">ALLOCATED</text>
      <text x="1305" y="44" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">448 bytes</text>
      <text x="1305" y="62" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">hdr: 0x1C1 | 0x1</text>
    </g>

    <!-- Free list pointer arrows -->
    <g stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6">
      <!-- Arrow from free block 1 to free block 2 -->
      <path d="M 540 80 C 540 130, 900 130, 900 80" marker-end="url(#arrowhead)"/>
      <!-- Arrow from free block 2 back to free block 1 -->
      <path d="M 910 90 C 910 150, 550 150, 550 90" stroke-dasharray="4 3" opacity="0.3"/>
    </g>
    <text x="720" y="145" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" opacity="0.7">free list →</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#fbbf24" opacity="0.6"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#22d3ee" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Block header detail diagram -->
  <g transform="translate(80, 320)">
    <text x="0" y="0" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="600">Block Header Structure (8 bytes)</text>

    <g transform="translate(0, 24)">
      <!-- Bit fields -->
      <rect x="0" y="0" width="800" height="50" rx="4" fill="#1a2332" stroke="#334155"/>

      <!-- Size field -->
      <rect x="1" y="1" width="600" height="48" rx="3" fill="#3b82f6" opacity="0.1"/>
      <text x="300" y="30" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="14" font-weight="bold">size (61 bits)</text>

      <!-- Prev alloc -->
      <rect x="601" y="1" width="100" height="48" fill="#a855f7" opacity="0.1"/>
      <text x="651" y="30" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="12">prev_alloc</text>

      <!-- Alloc bit -->
      <rect x="701" y="1" width="98" height="48" rx="3" fill="#22c55e" opacity="0.15"/>
      <text x="750" y="30" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="12">alloc</text>

      <!-- Bit labels -->
      <text x="0" y="70" fill="#475569" font-family="monospace" font-size="10">bit 63</text>
      <text x="600" y="70" fill="#475569" font-family="monospace" font-size="10">bit 2</text>
      <text x="700" y="70" fill="#475569" font-family="monospace" font-size="10">bit 1</text>
      <text x="775" y="70" fill="#475569" font-family="monospace" font-size="10">bit 0</text>
    </g>
  </g>

  <!-- Coalescing animation diagram -->
  <g transform="translate(80, 460)">
    <text x="0" y="0" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="600">Coalescing on Free</text>
    <text x="240" y="0" fill="#64748b" font-family="sans-serif" font-size="14">— merging adjacent free blocks</text>

    <!-- Before -->
    <text x="0" y="35" fill="#94a3b8" font-family="monospace" font-size="12">BEFORE free(ptr):</text>
    <g transform="translate(0, 48)">
      <rect x="0" y="0" width="200" height="50" rx="4" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 2"/>
      <text x="100" y="30" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="12">FREE (128B)</text>

      <rect x="210" y="0" width="200" height="50" rx="4" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
      <text x="310" y="30" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="12">ALLOC (64B)</text>

      <rect x="420" y="0" width="200" height="50" rx="4" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 2"/>
      <text x="520" y="30" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="12">FREE (256B)</text>
    </g>

    <!-- Arrow -->
    <g transform="translate(680, 55)">
      <text x="0" y="20" fill="#fbbf24" font-family="sans-serif" font-size="24">→</text>
    </g>

    <!-- After -->
    <text x="750" y="35" fill="#94a3b8" font-family="monospace" font-size="12">AFTER (coalesced):</text>
    <g transform="translate(750, 48)">
      <rect x="0" y="0" width="620" height="50" rx="4" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
      <text x="310" y="30" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="13" font-weight="bold">FREE (448B) — merged!</text>
    </g>
  </g>

  <!-- Performance metrics -->
  <g transform="translate(80, 600)">
    <text x="0" y="0" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="600">Allocator Benchmarks</text>

    <!-- Metric cards -->
    <rect x="0" y="20" width="320" height="100" rx="10" fill="#1a2332" stroke="#334155"/>
    <text x="20" y="52" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="1">THROUGHPUT</text>
    <text x="20" y="90" fill="#fbbf24" font-family="monospace" font-size="36" font-weight="bold">68.4%</text>
    <text x="200" y="90" fill="#64748b" font-family="sans-serif" font-size="13">of libc malloc</text>

    <rect x="340" y="20" width="320" height="100" rx="10" fill="#1a2332" stroke="#334155"/>
    <text x="360" y="52" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="1">UTILIZATION</text>
    <text x="360" y="90" fill="#22c55e" font-family="monospace" font-size="36" font-weight="bold">74.1%</text>
    <text x="520" y="90" fill="#64748b" font-family="sans-serif" font-size="13">memory efficiency</text>

    <rect x="680" y="20" width="320" height="100" rx="10" fill="#1a2332" stroke="#334155"/>
    <text x="700" y="52" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="1">FRAGMENTATION</text>
    <text x="700" y="90" fill="#a855f7" font-family="monospace" font-size="36" font-weight="bold">8.3%</text>
    <text x="840" y="90" fill="#64748b" font-family="sans-serif" font-size="13">external frag</text>

    <rect x="1020" y="20" width="400" height="100" rx="10" fill="#1a2332" stroke="#334155"/>
    <text x="1040" y="52" fill="#64748b" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="1">POLICY</text>
    <text x="1040" y="80" fill="#e2e8f0" font-family="monospace" font-size="14">Best-fit + boundary tags</text>
    <text x="1040" y="100" fill="#e2e8f0" font-family="monospace" font-size="14">+ immediate coalescing</text>
  </g>

  <!-- Code snippet -->
  <g transform="translate(80, 760)">
    <text x="0" y="0" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="600">Core API</text>
    <rect x="0" y="16" width="1440" height="180" rx="10" fill="#0a0a0a" stroke="#222"/>

    <text x="24" y="48" fill="#c084fc" font-family="monospace" font-size="14">void</text>
    <text x="60" y="48" fill="#fbbf24" font-family="monospace" font-size="14">*mm_malloc</text>
    <text x="168" y="48" fill="#94a3b8" font-family="monospace" font-size="14">(</text>
    <text x="178" y="48" fill="#c084fc" font-family="monospace" font-size="14">size_t</text>
    <text x="230" y="48" fill="#e2e8f0" font-family="monospace" font-size="14">size</text>
    <text x="268" y="48" fill="#94a3b8" font-family="monospace" font-size="14">);</text>
    <text x="340" y="48" fill="#475569" font-family="monospace" font-size="13">// Best-fit search through explicit free list</text>

    <text x="24" y="76" fill="#c084fc" font-family="monospace" font-size="14">void</text>
    <text x="68" y="76" fill="#fbbf24" font-family="monospace" font-size="14">mm_free</text>
    <text x="144" y="76" fill="#94a3b8" font-family="monospace" font-size="14">(</text>
    <text x="154" y="76" fill="#c084fc" font-family="monospace" font-size="14">void</text>
    <text x="194" y="76" fill="#94a3b8" font-family="monospace" font-size="14">*</text>
    <text x="204" y="76" fill="#e2e8f0" font-family="monospace" font-size="14">ptr</text>
    <text x="234" y="76" fill="#94a3b8" font-family="monospace" font-size="14">);</text>
    <text x="340" y="76" fill="#475569" font-family="monospace" font-size="13">// Free + immediate 4-way coalesce</text>

    <text x="24" y="104" fill="#c084fc" font-family="monospace" font-size="14">void</text>
    <text x="60" y="104" fill="#fbbf24" font-family="monospace" font-size="14">*mm_realloc</text>
    <text x="180" y="104" fill="#94a3b8" font-family="monospace" font-size="14">(</text>
    <text x="190" y="104" fill="#c084fc" font-family="monospace" font-size="14">void</text>
    <text x="230" y="104" fill="#94a3b8" font-family="monospace" font-size="14">*</text>
    <text x="240" y="104" fill="#e2e8f0" font-family="monospace" font-size="14">ptr</text>
    <text x="266" y="104" fill="#94a3b8" font-family="monospace" font-size="14">,</text>
    <text x="280" y="104" fill="#c084fc" font-family="monospace" font-size="14">size_t</text>
    <text x="336" y="104" fill="#e2e8f0" font-family="monospace" font-size="14">size</text>
    <text x="372" y="104" fill="#94a3b8" font-family="monospace" font-size="14">);</text>
    <text x="400" y="104" fill="#475569" font-family="monospace" font-size="13">// In-place expand when possible</text>

    <text x="24" y="132" fill="#c084fc" font-family="monospace" font-size="14">void</text>
    <text x="60" y="132" fill="#fbbf24" font-family="monospace" font-size="14">*mm_calloc</text>
    <text x="172" y="132" fill="#94a3b8" font-family="monospace" font-size="14">(</text>
    <text x="182" y="132" fill="#c084fc" font-family="monospace" font-size="14">size_t</text>
    <text x="234" y="132" fill="#e2e8f0" font-family="monospace" font-size="14">n</text>
    <text x="246" y="132" fill="#94a3b8" font-family="monospace" font-size="14">,</text>
    <text x="260" y="132" fill="#c084fc" font-family="monospace" font-size="14">size_t</text>
    <text x="312" y="132" fill="#e2e8f0" font-family="monospace" font-size="14">size</text>
    <text x="348" y="132" fill="#94a3b8" font-family="monospace" font-size="14">);</text>
    <text x="400" y="132" fill="#475569" font-family="monospace" font-size="13">// Zero-initialized allocation</text>

    <text x="24" y="168" fill="#c084fc" font-family="monospace" font-size="14">bool</text>
    <text x="64" y="168" fill="#fbbf24" font-family="monospace" font-size="14">mm_checkheap</text>
    <text x="184" y="168" fill="#94a3b8" font-family="monospace" font-size="14">(</text>
    <text x="194" y="168" fill="#c084fc" font-family="monospace" font-size="14">int</text>
    <text x="224" y="168" fill="#e2e8f0" font-family="monospace" font-size="14">line</text>
    <text x="258" y="168" fill="#94a3b8" font-family="monospace" font-size="14">);</text>
    <text x="340" y="168" fill="#475569" font-family="monospace" font-size="13">// Heap consistency checker for debugging</text>
  </g>
</svg>
